name: Shopt
description: A simple shopping list app with shop grouping and item ordering.
homepage: https://github.com/domob1812/shopt2
issue_tracker: https://github.com/domob1812/shopt2/issues

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.0
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: false  # Since you're only targeting Android for F-Droid
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"
  min_sdk_android: 21  # Android 5.0+
  
  # Remove old launcher icons before generating new ones
  remove_alpha_ios: true
